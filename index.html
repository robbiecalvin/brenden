<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Access</title>

<link rel="stylesheet" href="./css/reset.css">
<link rel="stylesheet" href="./css/variables.css">
<link rel="stylesheet" href="./css/theme.css">
<link rel="stylesheet" href="./css/typography.css">

<style>

body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #0a0a0a;
    color: #fff;
    font-family: sans-serif;
}

.login-container {
    background: #111;
    padding: 40px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h1 {
    margin-bottom: 20px;
    font-size: 22px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border: none;
    border-radius: 6px;
    background: #1a1a1a;
    color: #fff;
}

input:focus {
    outline: 2px solid #4cafef;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #4cafef;
    color: #000;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

#error {
    margin-top: 10px;
    font-size: 14px;
    color: #ff4d4d;
    text-align: center;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    text-align: center;
    opacity: 0.5;
}

</style>

</head>

<body>

<div class="login-container">

    <h1>Restricted Access</h1>

    <input 
        id="username" 
        placeholder="Username"
        autocomplete="off"
    >

    <input 
        id="password" 
        type="password"
        placeholder="Password"
    >

<button 
type="button"
id="loginBtn">
    Enter
</button>

    <p id="error"></p>

    <div class="footer">
        Authorized users only
    </div>

</div>



<script type="module">

import { login, isAuthenticated } from "./js/auth.js";


// Only redirect if a real login exists
if (
    localStorage.getItem("auth") === "true"
) {
    window.location.href = "./pages/dashboard.html";
}



const loginButton =
document.getElementById("loginBtn");


loginButton.addEventListener(
"click",
function(event){

    event.preventDefault();


    const username =
    document.getElementById("username")
    .value
    .trim();


    const password =
    document.getElementById("password")
    .value
    .trim();



    const success =
    login(username,password);



    if(success){

        window.location.href =
        "./pages/dashboard.html";

    }

    else {

        document.getElementById("error")
        .innerText =
        "Invalid username or password";

    }

});



document.addEventListener(
"keydown",
function(event){

    if(event.key === "Enter"){

        event.preventDefault();

        loginButton.click();

    }

});

</script>

</body>

</html>
